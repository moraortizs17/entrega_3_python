{% extends 'store/base.html' %}

{% block title %}Cerrar Sesión{% endblock %}

{% block content %}
    <div class="mt-4 p-4" style="background: white; border-radius: 15px; border-left: 5px solid #f72585; max-width: 500px; margin: auto;">
        <h2>¿Deseas cerrar sesión?</h2>
        <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-primary mt-3">Cerrar sesión</button>
        </form>
        <a href="{% url 'index' %}" class="btn btn-secondary mt-2">Cancelar</a>
    </div>
{% endblock %}
