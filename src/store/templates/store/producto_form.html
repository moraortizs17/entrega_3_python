{% extends 'store/base.html' %}

{% block title %}{% if object %}Editar{% else %}Crear{% endif %} Producto{% endblock %}

{% block content %}
    <div class="mt-4 p-4" style="background: white; border-radius: 15px; border-left: 5px solid #f72585; max-width: 600px; margin: auto;">
        <h2>{% if object %}Editar{% else %}Crear{% endif %} Producto</h2>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary mt-3">Guardar</button>
        </form>
        <a href="{% url 'productos' %}" class="btn btn-secondary mt-2">Cancelar</a>
    </div>
{% endblock %}
