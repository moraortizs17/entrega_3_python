{% extends 'store/base.html' %}

{% block title %}Categorías{% endblock %}

{% block content %}
    <h2>Categorías</h2>
    <ul>
        {% for categoria in categorias %}
            <li>{{ categoria.nombre_categoria }} - {{ categoria.descripcion }} | Estado: {{ categoria.estado_categoria }}</li>
        {% endfor %}
    </ul>
{% endblock %}
