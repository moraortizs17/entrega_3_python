<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mi Tienda de Ropa{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f0fc;
        }
        .navbar {
            background: linear-gradient(90deg, #dee81b, #e91414);
        }
        .navbar-brand, .nav-link {
            color: white !important;
            font-weight: bold;
        }
        .nav-link:hover {
            color: #ffd6ff !important;
        }
        h2 {
            color: #17b709;
            margin-top: 30px;
        }
        ul li {
            background: white;
            margin: 8px 0;
            padding: 10px 15px;
            border-radius: 10px;
            border-left: 5px solid #2da319;
        }
        .navbar-links {
            list-style: none;
             display: flex;
             gap: 20px;
             margin-left: auto;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg mb-4">
        {% include 'store/componentes/navbar.html' %}
    </nav>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
